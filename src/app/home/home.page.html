<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Weekly Food Chart Maker</ion-card-title>
      <ion-card-subtitle>You are logged in</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p *ngIf="userEmail">Signed in as: {{ userEmail }}</p>
      <ion-button expand="block" color="danger" (click)="onLogout()">
        Logout
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
