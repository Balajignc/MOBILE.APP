<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes platform view</title>
  <desc id="desc">A simple Kubernetes architecture view with users, service, pods, monitoring, and logging.</desc>
  <rect width="960" height="520" fill="#f2f5fb"/>
  <text x="480" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d3557">Kubernetes Platform View</text>
  <rect x="70" y="120" width="160" height="70" rx="18" fill="#d6e6ff"/>
  <text x="150" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3557">Users</text>
  <rect x="290" y="120" width="170" height="70" rx="18" fill="#ffd8b8"/>
  <text x="375" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3557">Service</text>
  <rect x="520" y="95" width="350" height="250" rx="24" fill="#ffffff" stroke="#8aa4d6" stroke-width="4"/>
  <text x="695" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d3557">Cluster</text>
  <rect x="560" y="170" width="100" height="120" rx="16" fill="#c7f0d8"/>
  <rect x="680" y="170" width="100" height="120" rx="16" fill="#c7f0d8"/>
  <rect x="800" y="170" width="100" height="120" rx="16" fill="#c7f0d8"/>
  <text x="610" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d3557">Pod 1</text>
  <text x="730" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d3557">Pod 2</text>
  <text x="850" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d3557">Pod 3</text>
  <rect x="230" y="390" width="220" height="70" rx="18" fill="#ffe7a8"/>
  <text x="340" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3557">Monitoring</text>
  <rect x="530" y="390" width="220" height="70" rx="18" fill="#f8c9ce"/>
  <text x="640" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3557">Logging</text>
  <g stroke="#1d3557" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M230 155 H290"/>
    <path d="M460 155 H520"/>
    <path d="M640 345 V390"/>
    <path d="M695 345 V390"/>
  </g>
