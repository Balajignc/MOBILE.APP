<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD pipeline</title>
  <desc id="desc">A simple CI/CD pipeline diagram showing Git, Jenkins, build, test, Docker image, and deployment to Kubernetes.</desc>
  <rect width="960" height="360" fill="#eef6f2"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#173f35">CI/CD Pipeline Example</text>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#173f35">
    <rect x="50" y="150" width="120" height="70" rx="16" fill="#b8e1d1"/><text x="110" y="192" text-anchor="middle">Git</text>
    <rect x="210" y="150" width="140" height="70" rx="16" fill="#ffd7a8"/><text x="280" y="192" text-anchor="middle">Jenkins</text>
    <rect x="390" y="150" width="120" height="70" rx="16" fill="#f8c7cc"/><text x="450" y="192" text-anchor="middle">Build</text>
    <rect x="550" y="150" width="120" height="70" rx="16" fill="#cde3ff"/><text x="610" y="192" text-anchor="middle">Test</text>
    <rect x="710" y="150" width="120" height="70" rx="16" fill="#ddd0ff"/><text x="770" y="192" text-anchor="middle">Docker</text>
    <rect x="760" y="255" width="150" height="70" rx="16" fill="#ffe6a7"/><text x="835" y="297" text-anchor="middle">Kubernetes</text>
  </g>
  <g stroke="#173f35" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M170 185 H210"/>
    <path d="M350 185 H390"/>
    <path d="M510 185 H550"/>
    <path d="M670 185 H710"/>
    <path d="M830 220 V255"/>
  </g>
</svg>
